<!-- Search bar -->
<section class="search-section">
  <input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Search Drinks..."
    class="search-bar"
  />
</section>

<!-- Products -->
<section class="products">
  <h2>Drinks</h2>

  <div class="product-grid">
    <div class="product-card" *ngFor="let product of filteredProducts">
      <img [src]="product.image" [alt]="product.name" />
      <h3>{{ product.name }}</h3>

      <div class="card-footer">
        <p class="price">Rs. {{ product.price }}</p>

        <div class="qty-box">
          <button (click)="decreaseQty(product)">−</button>
          <span>{{ getQty(product) }}</span>
          <button (click)="increaseQty(product)">+</button>
        </div>
      </div>
    </div>
  </div>

</section>

<!-- Cart -->
<div class="cart-preview" *ngIf="cartItems.length > 0">
  
  <div class="cart-header" (click)="toggleCart()">
    <h3>
      🛒 Cart
      <span>{{ isCartOpen ? '▼' : '▲' }}</span>
    </h3>
  </div>

  <div class="cart-items" *ngIf="isCartOpen">
    <div *ngFor="let item of cartItems" class="cart-item">
      <span>{{ item.name }} x{{ item.qty }}</span>
      <span>Rs. {{ item.price * item.qty }}</span>
    </div>
  </div>

  <button (click)="downloadPDF()" class="pdf-btn">
    Download Bill
  </button>

  <div class="cart-bottom">
    <div class="cart-info">
      🛒 {{ cartItems.length }} items | Rs. {{ totalPrice }}
    </div>

    <button (click)="sendCartToWhatsApp()" class="cart-btn">
      Click to Buy
    </button>
  </div>

</div>

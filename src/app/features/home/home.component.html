<!-- HERO BANNER -->
<section class="hero-banner">
  <div class="hero-left">
    <h1>
      <span class="green-text">Super Price</span>,
      <span class="blue-text">Super Quality</span>
    </h1>
    <p>
      Everything you need at Home – Grocery, Snacks & Drinks, Stationery,
      Printing & Laminations etc.
    </p>
    <br />
    <a routerLink="/grocery" class="shop-btn">Start Shopping</a>
  </div>

  <div class="hero-right">
    <img src="assets/images/grocery-banner.jpg" alt="banner" />
  </div>
</section>

<!-- CATEGORY STRIP -->
<section class="category-strip">
  <div class="category-item">
    <div class="icon">🛒</div>
    <p>Grocery</p>
  </div>

  <div class="category-item">
    <div class="icon">✏️</div>
    <p>Stationery</p>
  </div>

  <div class="category-item">
    <div class="icon">🥪</div>
    <p>Snacks</p>
  </div>

  <div class="category-item">
    <div class="icon">🥤</div>
    <p>Drinks</p>
  </div>

  <div class="category-item">
    <div class="icon">🖨️</div>
    <p>Cafe Services</p>
  </div>
</section>

<!-- SEARCH BAR -->
<section class="search-section">
  <input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Search products..."
    class="search-bar"
  />
</section>

<!-- PRODUCT SECTIONS -->
<section class="products-section">

  <div *ngFor="let category of getFilteredCategories()" class="products">

    <h2>{{ category.category }}</h2>

    <div class="product-grid">

      <div class="product-card" *ngFor="let product of category.products | slice:0:4">

        <img [src]="product.image" [alt]="product.name" />

        <h3>{{ product.name }}</h3>

        <!-- SAME DESIGN AS YOUR WORKING VERSION -->
        <div class="card-footer">
          <p class="price">RM {{ product.price }}</p>
          <button>Add to Cart</button>
        </div>

      </div>

    </div>

    <div class="see-more-wrapper">
      <a [routerLink]="category.routerLink" class="see-more">
        See more →
      </a>
    </div>

  </div>

</section>

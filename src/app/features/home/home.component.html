<!-- CATEGORY LOOP -->
<section class="products-section">

  <div
    *ngFor="let category of filteredCategories"
    class="products"
    [ngClass]="{
      'drinks-theme': category.category === 'Drinks',
      'cafe-theme': category.category === 'Cafe Services'
    }"
  >

    <!-- TITLE -->
    <div class="section-header">
      <h2>{{ category.category }}</h2>
    </div>

    <!-- PRODUCTS -->
    <div class="product-grid">

      <div class="product-card" *ngFor="let product of category.products">

        <img
          [src]="product.image"
          [alt]="product.name"
          loading="lazy"
        />

        <!-- Coming Soon (Cafe only) -->
        <div
          class="coming-soon"
          *ngIf="category.category === 'Cafe Services'"
        >
          Coming Soon
        </div>

        <h3>{{ product.name }}</h3>

        <!-- INIT DEFAULT OPTION SAFELY -->
        <ng-container *ngIf="!product.selectedOption">
          {{ setDefaultOption(product) }}
        </ng-container>

        <!-- DROPDOWN (multiple options) -->
        <div *ngIf="product.options?.length > 1">

          <select
            [(ngModel)]="product.selectedOption"
            class="qty-dropdown"
          >
            <option
              *ngFor="let opt of product.options"
              [ngValue]="opt"
            >
              {{ opt.label }} - Rs. {{ opt.price }}
            </option>
          </select>

        </div>

        <!-- SINGLE OPTION -->
        <div
          *ngIf="product.options?.length === 1"
          class="qty-label"
        >
          {{ product.options[0].label }} - Rs. {{ product.options[0].price }}
        </div>

        <!-- FOOTER -->
        <div class="card-footer">

          <p class="price">
            Rs. {{ product.selectedOption?.price || product.options[0]?.price }}
          </p>

          <div class="qty-box">

            <button (click)="decreaseQty(product)">−</button>

            <span>{{ getQty(product) }}</span>

            <button (click)="increaseQty(product)">+</button>

          </div>

        </div>

      </div>

    </div>

    <a [routerLink]="category.routerLink" class="see-more">
      See More →
    </a>

  </div>

</section>

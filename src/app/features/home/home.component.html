<!-- ================= HERO ================= -->
<section class="hero-banner">

  <div class="hero-left">

    <h1>
      <span class="green-text">Super Price</span>,
      <span class="blue-text">Super Quality</span>
    </h1>

    <p>
      Everything you need at Home – Grocery,
      Snacks, Drinks, Stationery,
      Printing & Laminations etc.
    </p>

    <a routerLink="/grocery" class="shop-btn">
      Start Shopping
    </a>

  </div>

  <div class="hero-right">

    <img
      src="assets/images/grocery-banner.jpg"
      alt="banner"
    />

  </div>

</section>

<!-- ================= CATEGORY STRIP ================= -->
<section class="category-strip">

  <div class="category-item" routerLink="/grocery">
    <div class="icon">🛒</div>
    <p>Grocery</p>
  </div>

  <div class="category-item" routerLink="/stationery">
    <div class="icon">✏️</div>
    <p>Stationery</p>
  </div>

  <div class="category-item" routerLink="/snacks">
    <div class="icon">🥪</div>
    <p>Snacks</p>
  </div>

  <div class="category-item" routerLink="/drinks">
    <div class="icon">🥤</div>
    <p>Drinks</p>
  </div>

  <div class="category-item" routerLink="/cafe">
    <div class="icon">🖨️</div>
    <p>Cafe Services</p>
  </div>

</section>
